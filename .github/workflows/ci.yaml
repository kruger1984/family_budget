name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15


    services:
      mysql_test:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: fb_mysql_root
          MYSQL_DATABASE: fb_mysql_test
          MYSQL_USER: fb_mysql
          MYSQL_PASSWORD: fb_mysql
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          coverage: xdebug

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install PHP Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Bun Dependencies & Build Assets
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Prepare Environment
        run: |
          cp .env.example .env
          php artisan key:generate

      # Налаштовуємо базу, ідентичну до docker-compose.yml
      - name: Configure Test Database
        run: |
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=mysql/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=fb_mysql_test/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=fb_mysql/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=fb_mysql/' .env

      - name: Run Linting & Static Analysis
        run: composer lint

      # ВАЖЛИВО: Перевизначаємо DB_HOST на рівні виконання команди.
      # Це переб'є будь-які налаштування з phpunit.xml чи .env і змусить
      # Laravel стукати на правильний хост у межах GitHub Actions.
      - name: Run Tests
        env:
          DB_HOST: 127.0.0.1
        run: composer coverage
